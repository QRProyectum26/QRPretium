<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - QRPretium</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SDK Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <!-- Encabezado del Panel -->
    <header class="bg-indigo-600 text-white shadow-md">
        <div class="max-w-xl mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold">Panel de Control</h1>
                <p id="subtituloCuit" class="text-xs text-indigo-200">Ingresa tu CUIT para administrar tu catálogo</p>
            </div>
            <a id="btnVerCatalogo" href="#" target="_blank" class="hidden bg-indigo-500 hover:bg-indigo-700 text-white text-xs px-3 py-2 rounded-lg font-medium transition">
                Ver mi catálogo ↗
            </a>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-6">

        <!-- PASO 1: Identificación por CUIT -->
        <section id="secIdentificacion" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-lg font-semibold text-gray-900 mb-2">1. Identificación del Comercio</h2>
            <p class="text-sm text-gray-500 mb-4">Ingresa tu CUIT para gestionar tu negocio:</p>
            <div class="flex space-x-2">
                <input type="text" id="inputCuit" placeholder="Ej: 20123456789" class="flex-grow px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <button onclick="conectarComercio()" class="bg-indigo-600 text-white px-5 py-2 rounded-lg font-medium hover:bg-indigo-700 transition">
                    Ingresar
                </button>
            </div>
        </section>

        <!-- CONTENIDO DEL PANEL (Oculto hasta ingresar CUIT) -->
        <div id="contenidoPanel" class="hidden space-y-6">

            <!-- Carga de nuevo producto -->
            <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900 mb-4">2. Cargar Nuevo Artículo</h2>
                <form id="formArticulo" onsubmit="guardarArticulo(event)" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Nombre del Producto *</label>
                        <input type="text" id="nombreArticulo" required placeholder="Ej: Coca Cola 1.5L" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Precio ($) *</label>
                            <input type="number" step="0.01" id="precioArticulo" required placeholder="1500" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">URL de la Imagen (opcional)</label>
                            <input type="url" id="imagenArticulo" placeholder="https://..." class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Descripción / Detalles</label>
                        <textarea id="descArticulo" rows="2" placeholder="Detalles o especificaciones del producto..." class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                    </div>

                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 rounded-lg transition">
                        + Publicar Artículo
                    </button>
                </form>
            </section>

            <!-- Lista de Artículos Cargados -->
            <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900 mb-4">Mis Artículos Publicados</h2>
                <div id="listaPanelArticulos" class="space-y-3">
                    <p class="text-gray-400 text-sm text-center py-4">Cargando productos...</p>
                </div>
            </section>

        </div>
    </main>

    <script>
        // Credenciales de Supabase
        const SUPABASE_URL = 'https://zbnuunaguciupyyzploq.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_TbHxIMFoRE6_Nu8MEUmtvA_ubsi9qFB';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let cuitActual = null;

        async function conectarComercio() {
            const input = document.getElementById('inputCuit').value.trim();
            if (!input) {
                alert("Por favor, ingresa un CUIT válido.");
                return;
            }

            cuitActual = input;

            // 1. Verificar si el comercio existe en la base de datos o crearlo si es nuevo
            let { data: comercio, error } = await supabaseClient
                .from('COMERCIOS')
                .select('*')
                .eq('cuit', cuitActual)
                .single();

            if (!comercio) {
                // Si no existe, lo creamos automáticamente
                const { error: errorCrear } = await supabaseClient
                    .from('COMERCIOS')
                    .insert([{ cuit: cuitActual }]);

                if (errorCrear) {
                    console.error("Error al registrar comercio:", errorCrear);
                    alert("Ocurrió un error al verificar el CUIT en la base de datos.");
                    return;
                }
            }

            // Mostrar la interfaz del panel
            document.getElementById('subtituloCuit').innerText = `Gestión activa para CUIT: ${cuitActual}`;
            document.getElementById('contenidoPanel').classList.remove('hidden');

            // Enlace directo para ver cómo queda su catálogo
            const btnVer = document.getElementById('btnVerCatalogo');
            btnVer.href = `catalogo.html?cuit=${cuitActual}`;
            btnVer.classList.remove('hidden');

            // Cargar los artículos existentes
            cargarArticulosComercio();
        }

        async function cargarArticulosComercio() {
            const contenedor = document.getElementById('listaPanelArticulos');
            contenedor.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">Cargando productos...</p>';

            const { data: articulos, error } = await supabaseClient
                .from('ARTICULOS')
                .select('*')
                .eq('cuit', cuitActual);

            if (error) {
                console.error("Error al cargar artículos:", error);
                contenedor.innerHTML = '<p class="text-red-500 text-sm text-center">Error al cargar la lista.</p>';
                return;
            }

            contenedor.innerHTML = '';

            if (articulos.length === 0) {
                contenedor.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">Aún no has cargado ningún producto.</p>';
                return;
            }

            articulos.forEach(item => {
                const tarjeta = `
                    <div class="flex items-center justify-between p-3 border rounded-lg hover:bg-gray-50 transition">
                        <div class="flex items-center space-x-3">
                            <img src="${item.imagen || 'https://via.placeholder.com/60'}" class="w-12 h-12 object-cover rounded border">
                            <div>
                                <h3 class="font-semibold text-gray-800 text-sm">${item.nombre}</h3>
                                <p class="text-indigo-600 font-bold text-xs">$${item.precio}</p>
                            </div>
                        </div>
                        <button onclick="eliminarArticulo(${item.id})" class="text-red-500 hover:text-red-700 text-xs bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded transition">
                            Eliminar
                        </button>
                    </div>
                `;
                contenedor.innerHTML += tarjeta;
            });
        }

        async function guardarArticulo(e) {
            e.preventDefault();

            const nombre = document.getElementById('nombreArticulo').value;
            const precio = parseFloat(document.getElementById('precioArticulo').value);
            const imagen = document.getElementById('imagenArticulo').value;
            const descripcion = document.getElementById('descArticulo').value;

            const { error } = await supabaseClient
                .from('ARTICULOS')
                .insert([
                    {
                        cuit: cuitActual,
                        nombre: nombre,
                        precio: precio,
                        imagen: imagen || null,
                        descripcion: descripcion || null
                    }
                ]);

            if (error) {
                console.error("Error al guardar:", error);
                alert("Error al intentar guardar el artículo.");
            } else {
                // Limpiar formulario y recargar
                document.getElementById('formArticulo').reset();
                cargarArticulosComercio();
            }
        }

        async function eliminarArticulo(id) {
            if (!confirm("¿Seguro que deseas eliminar este producto?")) return;

            const { error } = await supabaseClient
                .from('ARTICULOS')
                .eq('id', id)
                .delete();

            if (error) {
                console.error("Error al eliminar:", error);
                alert("No se pudo eliminar el artículo.");
            } else {
                cargarArticulosComercio();
            }
        }
    </script>
</body>
</html>
