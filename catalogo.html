<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos - QRPretium</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen pb-10">

    <!-- Encabezado / Logo del Comercio (Gris Pizarra por defecto #334155) -->
    <header id="headerComercio" class="text-white p-5 shadow-lg rounded-b-2xl transition-colors duration-300" style="background-color: #334155;">
        <div class="max-w-xl mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <!-- Logo o Ícono por defecto al lado del Nombre -->
                <div id="logoContainer" class="flex-shrink-0">
                    <img id="imgLogo" src="https://cdn-icons-png.flaticon.com/512/869/869636.png" alt="Logo Comercio" class="h-12 w-12 rounded-full bg-white p-1 shadow-md object-cover border border-slate-400">
                </div>
                <div class="text-left">
                    <div class="flex items-center space-x-2">
                        <h1 id="nombreComercio" class="text-xl font-extrabold uppercase tracking-wide leading-tight">Cargando comercio...</h1>
                        
                        <!-- BOTÓN "+" VERDE DESTACADO -->
                        <button onclick="abrirModalInfo()" title="Ver información del comercio" 
                            class="bg-emerald-500 hover:bg-emerald-600 text-white font-black w-7 h-7 rounded-full flex items-center justify-center shadow-md transform active:scale-95 transition-all text-lg leading-none border border-emerald-400">
                            +
                        </button>
                    </div>
                    <p class="text-xs text-slate-200 font-medium">Catálogo Oficial de Productos</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="max-w-xl mx-auto px-4 mt-5">

        <!-- Buscador de Productos -->
        <div class="mb-5">
            <div class="relative shadow-sm rounded-xl">
                <input type="text" id="inputBuscar" onkeyup="filtrarProductos()" placeholder="🔍 Buscar por código, artículo o descripción..." 
                    class="w-full pl-4 pr-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-slate-600 text-sm bg-white">
            </div>
        </div>

        <!-- Mensaje de Estado / Errores -->
        <div id="mensajeEstado" class="text-center py-8 hidden">
            <p id="textoEstado" class="text-gray-500 font-medium"></p>
        </div>

        <!-- Lista de Productos -->
        <div id="listaProductos" class="space-y-4">
            <!-- Los productos se cargarán aquí dinámicamente -->
        </div>

    </main>

    <!-- POP-UP / MODAL DE INFORMACIÓN DEL COMERCIO -->
    <div id="modalInfo" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden transform transition-all border border-gray-100">
            
            <!-- Franja Header Gris Pizarra (#334155) -->
            <div class="p-5 text-white relative" style="background-color: #334155;">
                <button onclick="cerrarModalInfo()" class="absolute top-4 right-4 text-slate-300 hover:text-white text-xl font-bold bg-slate-700/50 w-8 h-8 rounded-full flex items-center justify-center">
                    ✕
                </button>
                <p class="text-xs font-semibold text-emerald-400 uppercase tracking-widest mb-1">Información del Local</p>
                
                <!-- Nombre del comercio -->
                <h2 id="modalNombreComercio" class="text-xl font-black uppercase tracking-wide pr-6 leading-tight">Comercio</h2>
                
                <!-- LÍNEA DE SEPARACIÓN EN NARANJA -->
                <div class="w-full h-1 bg-orange-500 rounded-full mt-3"></div>
            </div>

            <!-- Cuerpo del Modal con los Datos -->
            <div class="p-5 space-y-4 text-sm text-gray-700">
                
                <!-- Horarios de Atención -->
                <div class="flex items-start space-x-3 bg-amber-50/80 p-3 rounded-xl border border-amber-200/60">
                    <span class="text-xl">🕒</span>
                    <div>
                        <h4 class="font-bold text-amber-900 text-xs uppercase">Horarios de Atención</h4>
                        <p id="modalHorarios" class="text-gray-700 font-medium mt-0.5">No especificados</p>
                    </div>
                </div>

                <!-- Dirección -->
                <div class="flex items-start space-x-3 bg-slate-50 p-3 rounded-xl border border-slate-200/60">
                    <span class="text-xl">📍</span>
                    <div class="w-full">
                        <h4 class="font-bold text-slate-900 text-xs uppercase">Dirección</h4>
                        <p id="modalDireccion" class="text-gray-700 font-medium mt-0.5">No especificada</p>
                        <a id="linkMapa" href="#" target="_blank" class="inline-block text-xs font-bold text-slate-700 hover:text-slate-900 underline mt-1.5 hidden">
                            📍 Ver en Google Maps →
                        </a>
                    </div>
                </div>

                <!-- Teléfono / WhatsApp -->
                <div class="flex items-start space-x-3 bg-slate-50 p-3 rounded-xl border border-slate-200/60">
                    <span class="text-xl">📞</span>
                    <div class="w-full">
                        <h4 class="font-bold text-slate-900 text-xs uppercase">Contacto Directo</h4>
                        <p id="modalTelefono" class="text-gray-700 font-medium mt-0.5">No especificado</p>
                        <a id="btnWhatsappModal" href="#" target="_blank" class="mt-2 w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-3 rounded-xl flex items-center justify-center space-x-2 text-xs transition shadow-sm hidden">
                            <span>💬 Enviar WhatsApp</span>
                        </a>
                    </div>
                </div>

            </div>

            <!-- Pie del Modal -->
            <div class="bg-gray-50 px-5 py-3 text-center border-t border-gray-100">
                <button onclick="cerrarModalInfo()" class="w-full py-2 bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold rounded-xl text-xs transition">
                    Cerrar
                </button>
            </div>

        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://zbnuunaguciupyyzploq.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_TbHxIMFoRE6_Nu8MEUmtvA_ubsi9qFB';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let productosGlobales = [];
        let datosComercioGlobal = null;

        const urlParams = new URLSearchParams(window.location.search);
        const cuitParam = urlParams.get('cuit') ? urlParams.get('cuit').trim() : null;

        async function cargarDatos() {
            if (!cuitParam) {
                mostrarError("No se ha especificado un CUIT de comercio en el enlace.");
                return;
            }

            try {
                // 1. Cargar Datos del Comercio
                let comercio = null;
                
                let res1 = await supabaseClient.from('comercios').select('*').eq('cuit', cuitParam).maybeSingle();
                if (res1.data) {
                    comercio = res1.data;
                } else {
                    let res2 = await supabaseClient.from('comercios').select('*').eq('CUIT', cuitParam).maybeSingle();
                    if (res2.data) comercio = res2.data;
                }

                if (!comercio) {
                    mostrarError("No se encontró el comercio solicitado.");
                    return;
                }

                // Guardar datos globalmente para el Pop-up
                datosComercioGlobal = comercio;

                // Renderizar datos del comercio en Header
                const nombre = comercio.nombre || comercio.NOMBRE || 'Mi Comercio';
                document.getElementById('nombreComercio').innerText = nombre;
                document.getElementById('modalNombreComercio').innerText = nombre;
                
                // Aplicar color personalizado al Header si existe
                const colorPersonalizado = comercio.color || comercio.COLOR || comercio.color_hex || comercio.COLOR_HEX;
                if (colorPersonalizado) {
                    document.getElementById('headerComercio').style.backgroundColor = colorPersonalizado;
                }

                const logoUrl = comercio.logo || comercio.LOGO;
                if (logoUrl && logoUrl.trim() !== '') {
                    document.getElementById('imgLogo').src = logoUrl;
                }

                // Cargar los datos dentro del Pop-up Modal
                configurarModalComercio(comercio);

                // 2. Cargar Productos del Comercio
                let productos = null;

                let prodRes1 = await supabaseClient.from('articulos').select('*').eq('cuit', cuitParam);
                if (prodRes1.data && prodRes1.data.length > 0) {
                    productos = prodRes1.data;
                } else {
                    let prodRes2 = await supabaseClient.from('articulos').select('*').eq('CUIT', cuitParam);
                    if (prodRes2.data && prodRes2.data.length > 0) {
                        productos = prodRes2.data;
                    }
                }

                if (!productos || productos.length === 0) {
                    mostrarError("Este comercio aún no tiene artículos cargados.");
                    return;
                }

                productosGlobales = productos;
                renderizarProductos(productosGlobales);

            } catch (err) {
                console.error("Error al conectar con Supabase:", err);
                mostrarError("Ocurrió un error al cargar la información del catálogo.");
            }
        }

        function configurarModalComercio(com) {
            // Horarios
            const horarios = com.horarios || com.HORARIOS || com.horario || com.HORARIO;
            if (horarios) document.getElementById('modalHorarios').innerText = horarios;

            // Dirección y Google Maps
            const direccion = com.direccion || com.DIRECCION;
            if (direccion) {
                document.getElementById('modalDireccion').innerText = direccion;
                const linkMapa = document.getElementById('linkMapa');
                linkMapa.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(direccion)}`;
                linkMapa.classList.remove('hidden');
            }

            // Teléfono y WhatsApp
            const telefono = com.telefono || com.TELEFONO;
            const whatsapp = com.whatsapp || com.WHATSAPP || telefono;

            if (telefono || whatsapp) {
                document.getElementById('modalTelefono').innerText = whatsapp || telefono;
            }

            if (whatsapp) {
                const numLimpio = whatsapp.replace(/[^0-9]/g, '');
                const btnWa = document.getElementById('btnWhatsappModal');
                btnWa.href = `https://wa.me/${numLimpio}`;
                btnWa.classList.remove('hidden');
            }
        }

        function abrirModalInfo() {
            document.getElementById('modalInfo').classList.remove('hidden');
        }

        function cerrarModalInfo() {
            document.getElementById('modalInfo').classList.add('hidden');
        }

        function renderizarProductos(lista) {
            const contenedor = document.getElementById('listaProductos');
            contenedor.innerHTML = '';

            if (lista.length === 0) {
                contenedor.innerHTML = '<p class="text-center text-gray-400 py-4">No se encontraron productos coincidentes.</p>';
                return;
            }

            lista.forEach(item => {
                const codigo = item.codigo || item.CODIGO || '';
                const articulo = item.articulo || item.ARTICULO || item.nombre || item.NOMBRE || item.descripcion || item.DESCRIPCION || 'Artículo sin título';
                const descripcion = (item.articulo || item.ARTICULO || item.nombre || item.NOMBRE) ? (item.descripcion || item.DESCRIPCION || '') : '';
                const disponibilidad = item.disponibilidad || item.DISPONIBILIDAD || '';
                const precio = item.precio || item.PRECIO || 0;
                const promocion = item.promocion || item.PROMOCION || '';

                const tarjeta = `
                    <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-200 relative overflow-hidden">
                        
                        <!-- 1. CÓDIGO & DISPONIBILIDAD -->
                        <div class="flex justify-between items-center mb-3 pb-2 border-b border-gray-100 gap-2">
                            ${codigo ? `<span class="bg-slate-800 text-white font-mono font-black text-base px-3 py-1 rounded-lg shadow-sm">CÓD: ${codigo}</span>` : '<span></span>'}
                            ${disponibilidad ? `<span class="bg-slate-100 text-slate-800 font-medium text-xs px-2.5 py-1 rounded-full border border-slate-200 text-right"><span class="font-bold text-gray-500 uppercase text-[10px]">Disponibilidad:</span> 📦 ${disponibilidad}</span>` : ''}
                        </div>

                        <!-- 2. ARTÍCULO -->
                        <h3 class="font-extrabold text-gray-900 text-lg leading-tight uppercase">${articulo}</h3>

                        <!-- 3. DESCRIPCIÓN -->
                        ${descripcion ? `<p class="text-xs text-gray-600 mt-1 leading-relaxed">${descripcion}</p>` : ''}

                        <!-- 4. PRECIO & PROMOCIÓN -->
                        <div class="mt-3 pt-2 border-t border-gray-100 flex flex-col space-y-1.5">
                            <div class="flex items-end justify-between">
                                <div>
                                    <p class="text-[10px] text-gray-400 uppercase font-semibold">Precio final</p>
                                </div>
                                <div class="text-right">
                                    <span class="text-slate-800 font-black text-2xl">$${Number(precio).toLocaleString('es-AR')}</span>
                                </div>
                            </div>
                            ${promocion ? `
                                <div>
                                    <span class="inline-block bg-amber-100 text-amber-800 font-bold text-[11px] px-2.5 py-1 rounded-lg uppercase tracking-wider w-full text-center border border-amber-200/60">
                                        🔥 ${promocion}
                                    </span>
                                </div>
                            ` : ''}
                        </div>

                    </div>
                `;
                contenedor.innerHTML += tarjeta;
            });
        }

        function filtrarProductos() {
            const busqueda = document.getElementById('inputBuscar').value.toLowerCase();
            const filtrados = productosGlobales.filter(prod => {
                const cod = (prod.codigo || prod.CODIGO || '').toString().toLowerCase();
                const art = (prod.articulo || prod.ARTICULO || prod.nombre || prod.NOMBRE || '').toLowerCase();
                const desc = (prod.descripcion || prod.DESCRIPCION || '').toLowerCase();
                return cod.includes(busqueda) || art.includes(busqueda) || desc.includes(busqueda);
            });
            renderizarProductos(filtrados);
        }

        function mostrarError(mensaje) {
            document.getElementById('nombreComercio').innerText = 'Comercio no encontrado';
            const divEstado = document.getElementById('mensajeEstado');
            document.getElementById('textoEstado').innerText = mensaje;
            divEstado.classList.remove('hidden');
        }

        window.onload = cargarDatos;
    </script>
</body>
</html>
